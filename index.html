<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Animais</title>
</head>
<body>
 <form action="" method="get" id="FormAdocaoCaes">
    <div>
        <label for="NomeUsuario">Nome completo: </label>
        <input id="NomeUsuario" type="text" required minlength="3"> 
    </div>

    <div>
        <label for="EmailUsuario">E-mail: </label>
        <input type="email" id="EmailUsuario" required> 
    </div>

    <div>
        <label for="TelefoneUsuario">Telefone: </label>
        <input type="tel" id="TelefoneUsuario" minlength="8" maxlength="11" required> 
    </div>

    <div>
        <label for="cpf">CPF: </label> 
        <input type="text" id="cpf" name="cpf"
            maxlength="11" pattern="\d{11}" required> 
    </div>

    <div>
        <label for="IdadeUsuario">Idade: </label>
        <input type="number" id="IdadeUsuario" min="18" required> 
    </div>

    <div>
        <label for="CidadeUsuario">Qual a sua cidade?</label>
        <input type="text" id="CidadeUsuario" required> 
    </div>

    <div>
        <label for="Moradia">Moradia: </label>
        <select name="Moradia" id="Moradia" required>
            <option value="" disabled selected>Selecione</option>
            <option value="Casa">Casa</option>
            <option value="Ap">Apartamento</option>
        </select>
    </div>

    <div class="hidden" id="DivPermissao">
        <label>O local permite animais?</label><br>
        <input type="radio" name="Permite" value="sim">Sim
        <input type="radio" name="Permite" value="nao">Não
    </div>

    <div>
        <label>Possui Quintal?</label><br>
        <input type="radio" name="Quintal" value="sim" required>Sim
        <input type="radio" name="Quintal" value="nao" required>Não
    </div>

    <div class="hidden" id="DivSeguranca">
        <label>O quintal é seguro?</label><br>
        <input type="radio" name="Seguranca" value="sim">Sim
        <input type="radio" name="Seguranca" value="nao">Não
    </div>

    <div>
        <label>Já teve pet antes?</label><br>
        
        <input type="radio" name="TevePet" value="sim" required>Sim
        <input type="radio" name="TevePet" value="nao" required>Não
    </div>

    <div>
        <label for="PetSozinho">Horas sozinho:</label>
        <input type="number" id="PetSozinho" min="0" max="24" required> 
    </div>

    <div>
        <label for="MotivoAdocao">Motivo:</label><br>
        <textarea id="MotivoAdocao" minlength="10" required></textarea> 
    </div>

    <div>
        <input type="checkbox" id="Termos" required>
        <label for="Termos">Aceito os <a href="#">termos</a></label>
    </div>

    <button type="submit">submit</button>

    <script src="scripts.js"></script>
</form>

</body>
</html>
