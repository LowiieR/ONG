<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Animais</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
  <div class="logo">
    <img id="icon" src="assets/image-removebg-preview.png" alt="Logo">
  </div>
<h1>ONG PetCare</h1>
  <nav class="nav">
    
    <a href="#">Início</a>
    <a href="#">Adoção</a>
    <a href="#">Sobre Nós</a>
  </nav>

  
</header>


<section class="hero">
    <div class="hero-text">
        <h1>Adote um amigo!</h1>
        <p>Dê uma nova chance para um animal cheio de amor.</p>

        <div class="hero-buttons">
            <button class="btn-primary">Adotar agora</button>
            <button class="btn-secondary">Ver animais</button>
        </div>
    </div>

    <img src="assets/Us__we_re_dumb_and_dumber__p-removebg-preview.png" alt="pets">
</section>

 <section class="form-section">

    <h2>Formulário de Adoção 🐾</h2>
    <p>Preencha os dados abaixo</p>

    <div class="form-container">

        <form id="FormAdocaoCaes">

            <div class="full">
                <label>Nome completo</label>
                <input id="NomeUsuario" type="text" required minlength="3">
            </div>

            <div>
                <label>Email</label>
                <input type="email" id="EmailUsuario" required>
            </div>

            <div>
                <label>Telefone</label>
                <input type="tel" id="TelefoneUsuario" required>
            </div>

            <div class="full">
                <label>CPF</label>
                <input type="text" id="cpf" required>
            </div>

            <div>
                <label>Idade</label>
                <input type="number" id="IdadeUsuario" required>
            </div>

            <div>
                <label>Cidade</label>
                <input type="text" id="CidadeUsuario" required>
            </div>

            <div class="full">
                <label>Moradia</label>
                <select id="moradia" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            </div>

            <div class="full hidden" id="DivPermissao">
                <div class="radio-group">
                    <label>Permite pets?</label>
                    <div class="radio-options">
                        <label><input type="radio" name="Permite" value="sim"> Sim</label>
                        <label><input type="radio" name="Permite" value="nao"> Não</label>
                    </div>
                </div>
            </div>

            <div class="full" id="DivQuintal">
                <div class="radio-group">
                    <label>Possui quintal?</label>
                    <div class="radio-options">
                        <label><input type="radio" id="QuintalSIm" name="Quintal" value="sim" required> Sim</label>
                        <label><input type="radio" id="QuintalNao" name="Quintal" value="nao" required> Não</label>
                    </div>
                </div>
            </div>

            <div class="full hidden" id="DivSeguranca">
                <div class="radio-group">
                    <label>O quintal é seguro?</label>
                    <div class="radio-options">
                        <label><input type="radio" name="seguranca" value="sim"> Sim</label>
                        <label><input type="radio" name="seguranca" value="nao"> Não</label>
                    </div>
                </div>
            </div>

            <div class="full">
                <div class="radio-group">
                    <label>Já teve pet?</label>
                    <div class="radio-options">
                        <label><input type="radio" name="tevePet" value="sim" required> Sim</label>
                        <label><input type="radio" name="tevePet" value="nao" required> Não</label>
                    </div>
                </div>
            </div>

            <div>
                <label>Horas  que o animal passará sozinho</label>
                <input type="number" id="PetSozinho" min="0" max="8" required>
            </div>

            <div>
                <label>Motivo da minha adoção</label>
                <textarea id="MotivoAdocao" required></textarea>
            </div>

            <div class="full termos">
                <label>
                    <input type="checkbox" id="Termos" required>
                    <label for="Termos">Eu aceito os <a href="#">termos de adoção</a></label>
                </label>
            </div>

            <button type="submit">Enviar</button>

        </form>

    </div>
</section>

<script src="scipts.js"></script>
</body>
</html>
